<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify CD</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #1DB954;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1AA34A;
        }
    </style>
</head>
<body>
    <h1>Spotify CD</h1>
    <button id='login-btn' onclick='authRedirect()'>Login / Connect with Spotify</button>

    <script>
        let loginBtn = document.getElementById('login-btn');
        loginBtn.addEventListener('click', authRedirect)
        function authRedirect() {
            document.location.href = "{% url 'auth_redirect' %}?next={{request.path}}";
        }
    </script>
</body>
</html>
